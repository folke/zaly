name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun --workspaces install --frozen-lockfile
      - run: bun install --frozen-lockfile --lockfile-only
      # TODO: enable once existing lint issues are fixed.
      # - run: bun z lint
      - run: bun z build
      - run: bun z test --bun
      - name: Check generated artifacts
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --quiet; then
            git status --short
            git diff --stat
            echo "::error::Generated artifacts changed. Run 'bun z build' and commit the result."
            exit 1
          fi
      - uses: stefanzweifel/git-auto-commit-action@v7
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          commit_message: "chore: update generated artifacts"

  release:
    needs: build
    if: ${{ !failure() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release-please.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release-please
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json
          target-branch: main
